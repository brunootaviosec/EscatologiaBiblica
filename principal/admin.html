<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Comando - Escatologia Bíblica</title>
    <style>
        /* Design Premium Glass (Modo Escuro Apple) */
        :root {
            --primary: #0a84ff;
            --bg-card: rgba(28, 28, 30, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(10, 132, 255, 0.15), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(94, 92, 230, 0.15), transparent 30%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            margin-bottom: 8px;
            text-align: center;
            font-size: 1.8rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .input-group { margin-bottom: 24px; position: relative; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2); }
        input::placeholder { color: #555; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #007aff; transform: translateY(-2px); }
        button:active { transform: scale(0.97); }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .voltar:hover { color: white; }

        /* Estilo da lista de sucesso */
        #statusMsg {
            text-align: center; margin-top: 16px; font-size: 0.9rem; font-weight: 500; display: none;
        }
        .success { color: #34c759; }
        .error { color: #ff3b30; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>Central de Comando</h2>
        <p class="subtitle">Adicione novas pastas e estudos à plataforma.</p>
        
        <form id="formAdmin">
            <div class="input-group">
                <label>Nome da Pasta</label>
                <input type="text" id="pastaNome" placeholder="Ex: Teologia Sistemática" required list="pastasList" autocomplete="off">
                <datalist id="pastasList"></datalist>
            </div>

            <div class="input-group">
                <label>Título do Estudo PDF</label>
                <input type="text" id="titulo" placeholder="Ex: O Contexto Histórico de Lucas" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Link do Google Drive (Compartilhado)</label>
                <input type="url" id="link" placeholder="https://drive.google.com/file/d/..." required autocomplete="off">
            </div>

            <button type="submit" id="btnSalvar">Publicar na Plataforma</button>
            <div id="statusMsg"></div>
        </form>

        <a href="principal.html" class="voltar">← Voltar ao Painel do Aluno</a>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
